<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('open');
    });
  </script>
  <script src="{{ "js/highlight-iris.js" | relURL }}"></script>
</body>
</html>
