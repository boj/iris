{{ define "main" }}
<div class="docs-layout">
  <aside class="docs-sidebar">
    <nav>
      <h4>Learn IRIS</h4>
      <ul>
        {{ range .Pages.ByWeight }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </aside>
  <article class="docs-content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </article>
</div>
{{ end }}
